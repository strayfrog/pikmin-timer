<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>皮克敏蘑菇重生計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .urgent-row { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0%, 100% { background-color: rgba(239, 68, 68, 0.1); } 50% { background-color: rgba(239, 68, 68, 0.25); } }
    </style>
</head>
<body class="bg-stone-50 min-h-screen p-4">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow p-4">
        <h1 class="text-xl font-bold mb-4">🍄 皮克敏蘑菇計時器</h1>
        <div id="rows-container" class="space-y-2 mb-4"></div>
        <div class="flex gap-2">
            <button onclick="addNewRow()" class="bg-emerald-600 text-white px-4 py-2 rounded">➕ 新增</button>
            <button onclick="togglePip()" class="bg-stone-800 text-white px-4 py-2 rounded">📺 懸浮視窗</button>
        </div>
    </div>

    <div class="hidden">
        <canvas id="pip-canvas" width="300" height="200"></canvas>
        <video id="pip-video" autoplay playsinline muted></video>
    </div>

    <script>
        let slots = JSON.parse(localStorage.getItem('pikmin_slots')) || [];
        if (slots.length === 0) for(let i=0; i<3; i++) slots.push(createSlot());

        function createSlot() { 
            return { id: Date.now() + Math.random(), location: '', time: '24:35', isLocked: false, targetRespawnTime: null }; 
        }

        function addNewRow() { slots.push(createSlot()); renderRows(); }
        
        function toggleLock(id) {
            let s = slots.find(x => x.id === id);
            if (!s.isLocked) {
                s.isLocked = true;
                const [m, sec] = s.time.split(':').map(Number);
                s.targetRespawnTime = Date.now() + ((m * 60 + sec + 300) * 1000);
            } else {
                s.isLocked = false;
            }
            localStorage.setItem('pikmin_slots', JSON.stringify(slots));
            renderRows();
        }

        function renderRows() {
            const container = document.getElementById('rows-container');
            container.innerHTML = slots.map(s => `
                <div class="flex items-center gap-2 p-2 border rounded ${s.isLocked ? 'bg-emerald-50' : ''}">
                    <input class="border p-1 w-24" value="${s.location}" onchange="updateSlot(${s.id}, 'location', this.value)">
                    <input class="border p-1 w-16" value="${s.time}" onchange="updateSlot(${s.id}, 'time', this.value)">
                    <span class="flex-1 text-xs font-mono">${s.isLocked ? new Date(s.targetRespawnTime).toLocaleTimeString() : '--:--'}</span>
                    <button onclick="toggleLock(${s.id})" class="text-sm px-2 py-1 bg-stone-200">${s.isLocked ? '解鎖' : '開始'}</button>
                    <button onclick="deleteRow(${s.id})" class="text-red-500">✕</button>
                </div>
            `).join('');
        }

        function updateSlot(id, key, val) {
            let s = slots.find(x => x.id === id);
            s[key] = val;
            localStorage.setItem('pikmin_slots', JSON.stringify(slots));
        }

        function deleteRow(id) {
            slots = slots.filter(x => x.id !== id);
            localStorage.setItem('pikmin_slots', JSON.stringify(slots));
            renderRows();
        }

        async function togglePip() {
            const v = document.getElementById('pip-video');
            if (document.pictureInPictureElement) document.exitPictureInPicture();
            else {
                v.srcObject = document.getElementById('pip-canvas').captureStream(10);
                await v.requestPictureInPicture();
            }
        }

        renderRows();
    </script>
</body>
</html>
